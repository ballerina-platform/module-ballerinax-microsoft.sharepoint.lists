          name: activated
        - value: deactivated
          description: Device has been deactivated by a mobile threat defense partner.
            The device health is not known.
          name: deactivated
        - value: secured
          description: Device is considered secured by the mobile threat defense partner.
          name: secured
        - value: lowSeverity
          description: Device is considered low threat by the mobile threat defense
            partner.
          name: lowSeverity
        - value: mediumSeverity
          description: Device is considered medium threat by the mobile threat defense
            partner.
          name: mediumSeverity
        - value: highSeverity
          description: Device is considered high threat by the mobile threat defense
            partner.
          name: highSeverity
        - value: unresponsive
          description: Device is considered unresponsive by the mobile threat defense
            partner. The device health is not known.
          name: unresponsive
        - value: compromised
          description: Device is considered compromised by the Threat Defense partner.
