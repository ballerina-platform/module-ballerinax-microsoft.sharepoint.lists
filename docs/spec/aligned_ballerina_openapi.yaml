    description: Provides operations to call the delta method.
    get:
      tags:
      - sites.list
      summary: Invoke function delta
      description: "Get newly created, updated, or deleted list items without having\
        \ to perform a full read of the entire items collection. Your app begins by\
        \ calling delta without any parameters.\r\nThe service starts enumerating\
        \ the hierarchy of the list, returning pages of items, and either an @odata.nextLink\
        \ or an @odata.deltaLink.\r\nYour app should continue calling with the @odata.nextLink\
        \ until you see an @odata.deltaLink returned. After you received all the\_\
        changes, you can apply them to your local state.\r\nTo check for changes in\
        \ the\_future, call delta again with the @odata.deltaLink from the previous\
        \ response. The delta feed shows the latest state for each item, not each\
        \ change. If an item was renamed twice, it only shows up once, with its latest\
        \ name.\r\nThe same item might appear more than once in a delta feed, for\
        \ various reasons. You should use the last occurrence you see. Items with\
        \ this property should be removed from your local state."
