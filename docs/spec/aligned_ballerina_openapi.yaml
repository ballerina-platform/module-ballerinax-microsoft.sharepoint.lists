            type: string
            description: Set by the server. DateTime in UTC when the object was created
              on the server
            format: date-time
            nullable: true
          activeDurationSeconds:
            maximum: 2147483647
            minimum: -2147483648
            type: number
            description: "Optional. The duration of active user engagement. if not\
