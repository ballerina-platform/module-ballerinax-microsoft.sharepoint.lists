    MicrosoftGraphEvent:
      allOf:
      - $ref: "#/components/schemas/MicrosoftGraphOutlookItem"
      - title: event
        type: object
        properties:
          isOnlineMeeting:
            type: boolean
            description: "True if this event has online meeting information (that\
              \ is, onlineMeeting points to an onlineMeetingInfo resource), false\
              \ otherwise. Default is false (onlineMeeting is null). Optional.  After\
              \ you set isOnlineMeeting to true, Microsoft Graph initializes onlineMeeting.\
              \ Subsequently, Outlook ignores any further changes to isOnlineMeeting,\
              \ and the meeting remains available online"
            nullable: true
          attachments:
            type: array
            description: "The collection of FileAttachment, ItemAttachment, and referenceAttachment\
              \ attachments for the event. Navigation property. Read-only. Nullable"
            items:
              $ref: "#/components/schemas/MicrosoftGraphAttachment"
            x-ms-navigationProperty: true
          cancelledOccurrences:
            type: array
            description: "Contains occurrenceId property values of canceled instances\
              \ in a recurring series, if the event is the series master. Instances\
              \ in a recurring series that are canceled are called canceled occurences.Requires\
              \ $select to retrieve. Only returned in a Get operation that specifies\
              \ the ID (seriesMasterId property value) of a series master event"
            items:
              type: string
          instances:
            type: array
            description: "The occurrences of a recurring series, if the event is a\
              \ series master. This property includes occurrences that are part of\
              \ the recurrence pattern, and exceptions modified, but doesn't include\
              \ occurrences canceled from the series. Navigation property. Read-only.\
              \ Nullable"
            items:
              $ref: "#/components/schemas/MicrosoftGraphEvent"
            x-ms-navigationProperty: true
          importance:
            description: "The importance of the event. The possible values are: low,\
              \ normal, high"
            anyOf:
            - $ref: "#/components/schemas/MicrosoftGraphImportance"
            - type: object
              nullable: true
          subject:
            type: string
            description: The text of the event's subject line
            nullable: true
          webLink:
            type: string
            description: "The URL to open the event in Outlook on the web.Outlook\
              \ on the web opens the event in the browser if you are signed in to\
              \ your mailbox. Otherwise, Outlook on the web prompts you to sign in.This\
              \ URL can't be accessed from within an iFrame"
            nullable: true
          iCalUId:
            type: string
            description: A unique identifier for an event across calendars. This ID
              is different for each occurrence in a recurring series. Read-only
            nullable: true
          isDraft:
            type: boolean
            description: "Set to true if the user has updated the meeting in Outlook\
              \ but hasn't sent the updates to attendees. Set to false if all changes\
              \ are sent, or if the event is an appointment without any attendees"
            nullable: true
          bodyPreview:
            type: string
            description: The preview of the message associated with the event. It's
              in text format
            nullable: true
          onlineMeetingProvider:
            description: "Represents the online meeting service provider. By default,\
              \ onlineMeetingProvider is unknown. The possible values are unknown,\
              \ teamsForBusiness, skypeForBusiness, and skypeForConsumer. Optional.\
              \  After you set onlineMeetingProvider, Microsoft Graph initializes\
              \ onlineMeeting. Subsequently, you can't change onlineMeetingProvider\
              \ again, and the meeting remains available online"
            anyOf:
            - $ref: "#/components/schemas/MicrosoftGraphOnlineMeetingProviderType"
            - type: object
              nullable: true
          body:
            description: The body of the message associated with the event. It can
              be in HTML or text format
            anyOf:
            - $ref: "#/components/schemas/MicrosoftGraphItemBody"
            - type: object
              nullable: true
          originalEndTimeZone:
            type: string
            description: The end time zone that was set when the event was created.
              A value of tzone://Microsoft/Custom indicates that a legacy custom time
              zone was set in desktop Outlook
            nullable: true
          type:
            description: "The event type. The possible values are: singleInstance,\
              \ occurrence, exception, seriesMaster. Read-only"
            anyOf:
            - $ref: "#/components/schemas/MicrosoftGraphEventType"
            - type: object
              nullable: true
          allowNewTimeProposals:
            type: boolean
            description: "true if the meeting organizer allows invitees to propose\
              \ a new time when responding; otherwise, false. Optional. The default\
              \ is true"
            nullable: true
          seriesMasterId:
            type: string
            description: "The ID for the recurring series master item, if this event\
              \ is part of a recurring series"
            nullable: true
          isAllDay:
            type: boolean
            description: "Set to true if the event lasts all day. If true, regardless\
              \ of whether it's a single-day or multi-day event, start, and endtime\
              \ must be set to midnight and be in the same time zone"
            nullable: true
          reminderMinutesBeforeStart:
            maximum: 2147483647
            minimum: -2147483648
            type: number
            description: The number of minutes before the event start time that the
              reminder alert occurs
            format: int32
            nullable: true
          multiValueExtendedProperties:
            type: array
            description: The collection of multi-value extended properties defined
              for the event. Read-only. Nullable
            items:
              $ref: "#/components/schemas/MicrosoftGraphMultiValueLegacyExtendedProperty"
            x-ms-navigationProperty: true
          end:
            description: "The date, time, and time zone that the event ends. By default,\
              \ the end time is in UTC"
            anyOf:
            - $ref: "#/components/schemas/MicrosoftGraphDateTimeTimeZone"
            - type: object
              nullable: true
          hasAttachments:
            type: boolean
            description: Set to true if the event has attachments
            nullable: true
          responseRequested:
            type: boolean
            description: "Default is true, which represents the organizer would like\
              \ an invitee to send a response to the event"
            nullable: true
          exceptionOccurrences:
            type: array
            description: "Contains the id property values of the event instances that\
              \ are exceptions in a recurring series.Exceptions can differ from other\
              \ occurrences in a recurring series, such as the subject, start or end\
              \ times, or attendees. Exceptions don't include canceled occurrences.Requires\
              \ $select and $expand to retrieve. Only returned in a GET operation\
              \ that specifies the ID (seriesMasterId property value) of a series\
              \ master event"
            items:
              $ref: "#/components/schemas/MicrosoftGraphEvent"
            x-ms-navigationProperty: true
          calendar:
            description: The calendar that contains the event. Navigation property.
              Read-only
            anyOf:
            - $ref: "#/components/schemas/MicrosoftGraphCalendar"
            - type: object
              nullable: true
            x-ms-navigationProperty: true
          isCancelled:
            type: boolean
            description: Set to true if the event has been canceled
            nullable: true
          originalStartTimeZone:
            type: string
            description: The start time zone that was set when the event was created.
              A value of tzone://Microsoft/Custom indicates that a legacy custom time
              zone was set in desktop Outlook
            nullable: true
          showAs:
            description: "The status to show. The possible values are: free, tentative,\
              \ busy, oof, workingElsewhere, unknown"
            anyOf:
            - $ref: "#/components/schemas/MicrosoftGraphFreeBusyStatus"
            - type: object
              nullable: true
          singleValueExtendedProperties:
            type: array
            description: The collection of single-value extended properties defined
              for the event. Read-only. Nullable
            items:
              $ref: "#/components/schemas/MicrosoftGraphSingleValueLegacyExtendedProperty"
            x-ms-navigationProperty: true
          attendees:
            type: array
            description: The collection of attendees for the event
            items:
              $ref: "#/components/schemas/MicrosoftGraphAttendee"
          isReminderOn:
            type: boolean
            description: Set to true if an alert is set to remind the user of the
              event
            nullable: true
          start:
            description: "The start date, time, and time zone of the event. By default,\
              \ the start time is in UTC"
            anyOf:
            - $ref: "#/components/schemas/MicrosoftGraphDateTimeTimeZone"
            - type: object
              nullable: true
          responseStatus:
            description: Indicates the type of response sent in response to an event
              message
            anyOf:
            - $ref: "#/components/schemas/MicrosoftGraphResponseStatus"
            - type: object
              nullable: true
          transactionId:
            type: string
            description: "A custom identifier specified by a client app for the server\
              \ to avoid redundant POST operations in case of client retries to create\
              \ the same event. It's useful when low network connectivity causes the\
              \ client to time out before receiving a response from the server for\
              \ the client's prior create-event request. After you set transactionId\
              \ when creating an event, you can't change transactionId in a subsequent\
              \ update. This property is only returned in a response payload if an\
              \ app has set it. Optional"
            nullable: true
          hideAttendees:
            type: boolean
            description: "When set to true, each attendee only sees themselves in\
              \ the meeting request and meeting Tracking list. The default is false"
            nullable: true
          recurrence:
            description: The recurrence pattern for the event
            anyOf:
            - $ref: "#/components/schemas/MicrosoftGraphPatternedRecurrence"
            - type: object
              nullable: true
          extensions:
            type: array
            description: The collection of open extensions defined for the event.
              Nullable
            items:
              $ref: "#/components/schemas/MicrosoftGraphExtension"
            x-ms-navigationProperty: true
          isOrganizer:
            type: boolean
            description: Set to true if the calendar owner (specified by the owner
              property of the calendar) is the organizer of the event (specified by
              the organizer property of the event). It also applies if a delegate
              organized the event on behalf of the owner
            nullable: true
          onlineMeeting:
            description: "Details for an attendee to join the meeting online. The\
              \ default is null. Read-only. After you set the isOnlineMeeting and\
              \ onlineMeetingProvider properties to enable a meeting online, Microsoft\
              \ Graph initializes onlineMeeting. When set, the meeting remains available\
              \ online, and you can't change the isOnlineMeeting, onlineMeetingProvider,\
              \ and onlneMeeting properties again"
            anyOf:
            - $ref: "#/components/schemas/MicrosoftGraphOnlineMeetingInfo"
            - type: object
              nullable: true
          organizer:
            description: The organizer of the event
            anyOf:
            - $ref: "#/components/schemas/MicrosoftGraphRecipient"
            - type: object
              nullable: true
          originalStart:
            pattern: "^[0-9]{4,}-(0[1-9]|1[012])-(0[1-9]|[12][0-9]|3[01])T([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]([.][0-9]{1,12})?(Z|[+-][0-9][0-9]:[0-9][0-9])$"
            type: string
            description: "Represents the start time of an event when it's initially\
              \ created as an occurrence or exception in a recurring series. This\
              \ property is not returned for events that are single instances. Its\
              \ date and time information is expressed in ISO 8601 format and is always\
              \ in UTC. For example, midnight UTC on Jan 1, 2014 is 2014-01-01T00:00:00Z"
            format: date-time
            nullable: true
          onlineMeetingUrl:
            type: string
            description: "A URL for an online meeting. The property is set only when\
              \ an organizer specifies in Outlook that an event is an online meeting\
              \ such as Skype. Read-only.To access the URL to join an online meeting,\
              \ use joinUrl which is exposed via the onlineMeeting property of the\
              \ event. The onlineMeetingUrl property will be deprecated in the future"
            nullable: true
          location:
            description: The location of the event
            anyOf:
            - $ref: "#/components/schemas/MicrosoftGraphLocation"
            - type: object
              nullable: true
          locations:
            type: array
            description: "The locations where the event is held or attended from.\
              \ The location and locations properties always correspond with each\
              \ other. If you update the location property, any prior locations in\
              \ the locations collection are removed and replaced by the new location\
              \ value"
            items:
              $ref: "#/components/schemas/MicrosoftGraphLocation"
          sensitivity:
            description: "The possible values are: normal, personal, private, and\
              \ confidential"
            anyOf:
            - $ref: "#/components/schemas/MicrosoftGraphSensitivity"
            - type: object
              nullable: true
